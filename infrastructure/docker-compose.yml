version: "3.9"

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: safemaps-postgis
    environment:
      POSTGRES_DB: healthroute
      POSTGRES_USER: healthroute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-postgis.sh:/docker-entrypoint-initdb.d/10-init-postgis.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U healthroute -d healthroute" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: safemaps-backend
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
      POSTGRES_DB: healthroute
      POSTGRES_USER: healthroute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      WAQI_API_TOKEN: ${WAQI_API_TOKEN}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CPCB_API_KEY: ${CPCB_API_KEY}
      WAZE_CCP_URL: ${WAZE_CCP_URL:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      CORS_ORIGINS: "http://localhost:3000,http://frontend"
    # Internal only — accessed via nginx proxy, not directly from host
    expose:
      - "8000"
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: safemaps-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
